<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 0;
      margin: 0;
      background: #ffffff;
    }
    .header {
      background: #1a1a1a;
      color: #d4af37;
      padding: 15px;
      text-align: center;
      border-bottom: 3px solid #d4af37;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .container {
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      color: #1a1a1a;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #c19b2e;
    }
    button:disabled {
      background: #eee;
      color: #999;
      cursor: not-allowed;
    }
    .status {
      margin-top: 15px;
      font-size: 12px;
      color: #444;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 4px;
      min-height: 20px;
      white-space: pre-wrap;
    }
    .footer {
      font-size: 10px;
      color: #999;
      text-align: center;
      padding: 10px;
      border-top: 1px solid #eee;
    }
  </style>
  <script src="xlsx.full.min.js"></script>
</head>
<body>
  <div class="header">TBHAVAR.IN MASTERDATA</div>
  <div class="container">
    <div class="form-group">
      <label for="cin" style="font-weight: bold; color: #1a1a1a;">1. Solve Captcha</label>
      <input type="text" id="cin" placeholder="e.g. U32909KA2023PTC171537">
    </div>
    <button id="scrapeBtn">Get Captcha Answer</button>
    <div class="status" id="status">Ready...</div>
    <div id="captchaDisplay" style="margin-top: 10px; border: 2px dashed #d4af37; padding: 10px; border-radius: 4px; text-align: center;">
        <div style="font-size: 10px; color: #999; margin-bottom: 5px;">Double-click to select & copy:</div>
        <div id="captchaValue" style="font-weight: bold; color: #d4af37; font-size: 24px; letter-spacing: 2px;">---</div>
    </div>

    <div style="margin-top: 25px; pt: 15px; border-top: 1px solid #eee;">
      <label style="font-weight: bold; color: #1a1a1a; margin-top: 10px;">2. Excel to Branded HTML</label>
      <div style="font-size: 11px; color: #666; margin-bottom: 10px;">Upload the .xlsx file downloaded from MCA:</div>
      <input type="file" id="excelFile" accept=".xlsx" style="font-size: 12px; margin-bottom: 10px;">
      <button id="convertBtn" style="background: #1a1a1a; color: #d4af37;">Generate Branded Report</button>
      <div class="status" id="excelStatus" style="margin-top: 10px;">Waiting for file...</div>
    </div>
  </div>
  <div class="footer">
    Office of Tanmay Bhavar, CA.
  </div>
  <script src="popup.js"></script>
</body>
</html>
